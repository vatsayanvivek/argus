site_name: ARGUS
site_description: Agentless, offline Azure CSPM + attack-chain analysis. Your data, your rules, your environment.
site_url: https://vatsayanvivek.github.io/argus/
repo_url: https://github.com/vatsayanvivek/argus
repo_name: vatsayanvivek/argus
edit_uri: ""

docs_dir: content
site_dir: ../site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vatsayanvivek/argus
  generator: false

copyright: >
  Copyright &copy; 2026 vatsayanvivek —
  PolyForm Strict License 1.0.0

nav:
  - Home: index.md
  - Install: install.md
  - Quick start: quickstart.md
  - CI / CD: cicd.md
  - Docker: docker.md
  - Rule catalog:
      - Overview: rules/index.md
  - Attack chains:
      - Overview: chains/index.md
  - Compliance: compliance.md
  - Output formats: output.md
  - FAQ: faq.md
  - Trust & verification: trust.md
  - Troubleshooting: troubleshooting.md
