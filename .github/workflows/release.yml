name: Release

# Triggered by pushing an annotated tag matching v*, or manually via
# the Actions UI. Builds every platform binary, the Windows GUI
# installer, the Docker image, generates SBOMs and SLSA build
# provenance, and publishes everything to the matching GitHub
# release + ghcr.io.
#
# Design notes:
#   - Parallelism: four independent jobs fan out from `resolve` —
#     binary cross-compile, NSIS installer build, and two native-
#     runner Docker builds (amd64 + arm64). A final `publish` job
#     gathers all artifacts and pushes the release.
#   - No QEMU: we use GitHub's native ARM runner (ubuntu-24.04-arm)
#     for the arm64 Docker build. QEMU emulation would add ~5 min
#     per release; native runners drop it to ~2 min.
#   - Aggressive caching: Go module cache + Docker buildx layer
#     cache cut cold-start time further.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to build (without leading v). Example: 1.0.0'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  # -------------------------------------------------------------------
  # resolve — one-step job that derives version + tag strings from
  # whichever trigger fired. Downstream jobs read these via outputs so
  # the parsing logic lives in one place.
  # -------------------------------------------------------------------
  resolve:
    name: Resolve version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag:     ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}"    >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  # binaries — cross-compile 5 platform binaries, generate SBOMs and
  # a build-provenance attestation. Uploads the whole dist/ tree as
  # an artifact that `publish` will later download alongside the
  # installer.
  # -------------------------------------------------------------------
  binaries:
    name: Binaries + SBOMs
    needs: resolve
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
          cache: true # caches ~/.cache/go-build and ~/go/pkg/mod

      - name: Install goversioninfo + syft
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | \
            sudo sh -s -- -b /usr/local/bin

      - name: Prepare embeds + Windows version info
        run: |
          make embed-prep
          $(go env GOPATH)/bin/goversioninfo -64 \
            -o cmd/resource_windows_amd64.syso \
            scripts/versioninfo.json

      - name: Cross-compile 5 platforms
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/argus-${os}-${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -ldflags="${LDFLAGS}" -o "$out" ./main.go
          done

      - name: Generate SBOMs
        run: |
          for bin in dist/argus-*; do
            [[ "$bin" == *.sbom.* ]] && continue
            syft --output "spdx-json=${bin}.sbom.spdx.json" "$bin"
          done

      - name: Compute SHA256SUMS
        working-directory: dist
        run: sha256sum argus-* > SHA256SUMS

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/argus-*

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
          retention-days: 1

  # -------------------------------------------------------------------
  # installer — downloads the windows amd64 binary from the
  # `binaries` job, runs NSIS against it to produce argus-setup.exe.
  # Separate job so a broken NSIS script doesn't re-run the whole
  # Go cross-compile.
  # -------------------------------------------------------------------
  installer:
    name: Windows GUI installer
    needs: binaries
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis

      - name: Build argus-setup.exe
        run: |
          mkdir -p scripts/dist
          cd scripts && makensis -V1 argus-installer.nsi
          cp dist/argus-setup.exe ../dist/ 2>/dev/null || cp scripts/dist/argus-setup.exe dist/
          ls -la dist/argus-setup.exe

      # Attest the installer too — same provenance trail.
      - name: Attest installer provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/argus-setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/argus-setup.exe
          retention-days: 1

  # -------------------------------------------------------------------
  # docker-amd64 / docker-arm64 — native-runner per-arch builds.
  #
  # Critical: we push by DIGEST, not by tag. Using per-arch tags
  # (like `argus:1.0.0-amd64`) would pollute the ghcr.io UI with
  # intermediate tags nobody's supposed to consume. Pushing by
  # digest leaves the registry clean — only the final multi-arch
  # manifest-list tag (`argus:1.0.0` / `argus:latest`) is visible
  # to users.
  # -------------------------------------------------------------------
  docker-amd64:
    name: Docker image (amd64)
    needs: resolve
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          build-args: VERSION=${{ needs.resolve.outputs.version }}
          # Push by digest only — outputs a digest the manifest job
          # will later reference. No intermediate tag in ghcr.io.
          outputs: |
            type=image,name=ghcr.io/${{ github.repository_owner }}/argus,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-amd64
          cache-to:   type=gha,scope=docker-amd64,mode=max

  docker-arm64:
    name: Docker image (arm64)
    needs: resolve
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          build-args: VERSION=${{ needs.resolve.outputs.version }}
          outputs: |
            type=image,name=ghcr.io/${{ github.repository_owner }}/argus,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-arm64
          cache-to:   type=gha,scope=docker-arm64,mode=max

  # -------------------------------------------------------------------
  # docker-manifest — assembles a multi-arch manifest from the two
  # per-arch images. Clients pulling `argus:<version>` get the right
  # arch automatically.
  # -------------------------------------------------------------------
  docker-manifest:
    name: Docker multi-arch manifest
    needs: [resolve, docker-amd64, docker-arm64]
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: push
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/argus
          VERSION: ${{ needs.resolve.outputs.version }}
          AMD64_DIGEST: ${{ needs.docker-amd64.outputs.digest }}
          ARM64_DIGEST: ${{ needs.docker-arm64.outputs.digest }}
        run: |
          # Assemble the multi-arch manifest from the two per-arch
          # digests pushed by docker-amd64 + docker-arm64. The result
          # is a single clean tag pair (v<version> + latest) in the
          # ghcr.io UI — no -amd64/-arm64 sidecars.
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"

          # Capture the assembled manifest-list digest for the
          # downstream attestation + cosign signing steps.
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{ json . }}' | jq -r '.manifest.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest Docker image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/argus
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - uses: sigstore/cosign-installer@v3

      - name: Sign Docker image with cosign
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE: ghcr.io/${{ github.repository_owner }}/argus
        run: |
          cosign sign --yes "${IMAGE}@${{ steps.push.outputs.digest }}"

  # -------------------------------------------------------------------
  # trivy — CVE scan the released image. Fails the release on any
  # HIGH/CRITICAL vulnerability. Uploads SARIF to Security tab (best
  # effort — failure to upload doesn't block the release).
  # -------------------------------------------------------------------
  trivy:
    name: Trivy CVE scan
    needs: [resolve, docker-manifest]
    runs-on: ubuntu-24.04
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/argus:${{ needs.resolve.outputs.version }}
          format: sarif
          output: trivy-report.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Upload SARIF to Security tab
        if: hashFiles('trivy-report.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif

  # -------------------------------------------------------------------
  # publish — final job. Downloads binaries + installer artifacts and
  # uploads them to the GitHub release page. Runs last so all
  # upstream verifications (SBOM, attestation, Trivy, cosign) have
  # cleared.
  # -------------------------------------------------------------------
  publish:
    name: Publish GitHub release
    needs: [resolve, binaries, installer, trivy]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: installer
          path: dist/

      - uses: actions/checkout@v4
        with:
          path: repo
          sparse-checkout: scripts/install.ps1
          sparse-checkout-cone-mode: false

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: |
            dist/argus-linux-amd64
            dist/argus-linux-arm64
            dist/argus-darwin-amd64
            dist/argus-darwin-arm64
            dist/argus-windows-amd64.exe
            dist/argus-setup.exe
            dist/SHA256SUMS
            dist/*.sbom.spdx.json
            repo/scripts/install.ps1
          generate_release_notes: true
          fail_on_unmatched_files: true
